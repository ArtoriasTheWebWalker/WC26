<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 — Group Stage · Mecca Time</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Outfit:wght@300;400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap');

:root{
  --night:#0B1020; --panel:#111A2E; --panel-2:#0E1526; --line:#22304F;
  --ink:#F2EFE6; --sand:#C9B896; --gold:#E3C567; --gold-deep:#B98A2E;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0B1020;
  background-image:
    radial-gradient(1400px 700px at 50% -250px, #1A2440 0%, transparent 70%),
    radial-gradient(2px 2px at 20% 30%, rgba(227,197,103,.25) 50%, transparent 51%),
    radial-gradient(2px 2px at 80% 15%, rgba(227,197,103,.18) 50%, transparent 51%),
    radial-gradient(1.5px 1.5px at 60% 60%, rgba(242,239,230,.12) 50%, transparent 51%);
  background-attachment:fixed;
  color:var(--ink); font-family:'Outfit',system-ui,sans-serif; font-weight:300; line-height:1.45;
  position:relative;
}
.wrap{max-width:1180px;margin:0 auto;padding:44px 22px 90px;position:relative;z-index:1}
#lang-toggle{
  position:absolute;top:0;right:0;z-index:5;
  background:linear-gradient(180deg,rgba(227,197,103,.16),rgba(185,138,46,.1));
  border:1px solid rgba(227,197,103,.5);color:var(--gold);
  font-family:'Cinzel',serif;font-weight:600;font-size:.82rem;letter-spacing:.04em;
  padding:7px 16px;border-radius:8px;cursor:pointer;transition:all .2s;
  backdrop-filter:blur(4px);
}
#lang-toggle:hover{background:linear-gradient(180deg,rgba(227,197,103,.28),rgba(185,138,46,.18));box-shadow:0 0 16px rgba(227,197,103,.3)}
body.ar #lang-toggle{font-family:'IBM Plex Sans Arabic',sans-serif;font-weight:600}
body.ar h1{font-family:'IBM Plex Sans Arabic',sans-serif;font-weight:700}
body.ar .ko-title{font-family:'IBM Plex Sans Arabic',sans-serif;font-weight:600}
body.ar .weekday,body.ar .group-title,body.ar .tname,body.ar .nm,body.ar .eyebrow,
body.ar .sub,body.ar .tz-badge,body.ar .ko-sub,body.ar .cd,body.ar .today-badge,
body.ar .month,body.ar footer,body.ar .live-pill,body.ar .gtable th{
  font-family:'IBM Plex Sans Arabic','Outfit',sans-serif;
}
body.ar{font-family:'IBM Plex Sans Arabic','Segoe UI',Tahoma,sans-serif}
/* keep the date number and all digits in the Latin (Outfit) face in both languages */
.date-num{font-family:'Cinzel',serif}
body.ar .date-num{font-family:'Outfit',sans-serif;font-weight:700}
/* force Western/Latin numerals globally so AR and EN match exactly */
*{font-feature-settings:"tnum" 0; -moz-font-feature-settings:"tnum" 0}
.ktime,.date-num,.gtable td,.cd b,.live-pill,.tz-badge{font-variant-numeric:lining-nums}
/* ---------- DESCENDING WORLD CUP BALL ---------- */
#wc-ball{
  position:fixed;left:0;top:0;z-index:0;pointer-events:none;
  filter:drop-shadow(0 6px 14px rgba(0,0,0,.55)) drop-shadow(0 0 18px rgba(227,197,103,.18));
  will-change:transform;opacity:.9;
}
#wc-ball svg{animation:ballspin 6s linear infinite}
@keyframes ballspin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@media (prefers-reduced-motion:reduce){#wc-ball svg{animation:none}}

/* ---------- HERO ---------- */
header{text-align:center;padding:18px 0 36px}
.eyebrow{font-weight:600;font-size:.72rem;letter-spacing:.42em;text-transform:uppercase;color:var(--gold);margin-bottom:16px}
h1{
  font-family:'Cinzel',serif;font-weight:900;font-size:clamp(2.1rem,5.5vw,3.8rem);
  letter-spacing:.06em;line-height:1.05;
  background:linear-gradient(180deg,#F7ECCB 0%,var(--gold) 55%,var(--gold-deep) 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.sub{margin-top:12px;color:var(--sand);font-size:.92rem;letter-spacing:.08em;font-weight:400}
.sub b{color:var(--ink);font-weight:600}
.tz-badge{
  display:inline-flex;align-items:center;gap:10px;margin-top:18px;border:1px solid var(--gold-deep);
  border-radius:999px;padding:8px 22px;font-size:.78rem;letter-spacing:.22em;text-transform:uppercase;
  font-weight:600;color:var(--gold);background:rgba(227,197,103,.06);
}
.tz-badge::before,.tz-badge::after{content:"✦";font-size:.68rem;color:var(--gold-deep)}
.hosts-line{margin-top:14px;display:flex;justify-content:center;gap:14px}
.hosts-line img{height:20px;border-radius:2px;box-shadow:0 2px 8px rgba(0,0,0,.5)}

/* ---------- VERTICAL GRID ---------- */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(440px,1fr));
  gap:22px; align-items:start;
}
.grid .day{width:100%}

/* ---------- DAY CARD ---------- */
.day{
  border:1px solid rgba(185,138,46,.4);border-radius:14px;overflow:hidden;
  background:linear-gradient(180deg,#111A2E 0%,#0E1526 100%);
  box-shadow:0 18px 44px -22px rgba(0,0,0,.85), inset 0 0 0 1px rgba(255,255,255,.02);
}
.band{display:none}
.day-head{
  display:flex;align-items:baseline;justify-content:space-between;gap:10px;
  padding:14px 18px 10px;border-bottom:1px solid var(--line);
}
.date-block{display:flex;align-items:baseline;gap:11px}
.date-num{font-family:'Cinzel',serif;font-weight:700;font-size:1.7rem;color:var(--gold);line-height:1}
.weekday{font-weight:600;font-size:.88rem;letter-spacing:.12em;text-transform:uppercase;display:block}
.month{color:var(--sand);font-size:.66rem;letter-spacing:.2em;text-transform:uppercase}
.motif{display:none}
.motif::before{content:"◆ ";color:var(--gold-deep);font-size:.55rem}

/* ---------- MATCH ROW ---------- */
.match{border-bottom:1px solid rgba(34,48,79,.6);padding:10px 12px 9px;position:relative}
.match:last-child{border-bottom:none}
.match:hover{background:rgba(227,197,103,.04)}
.match.sa{box-shadow:inset 3px 0 0 var(--gold);background:linear-gradient(90deg,rgba(22,93,49,.14),transparent 30%,transparent 70%,rgba(22,93,49,.14))}
.m-row{display:flex;align-items:center;gap:6px}

/* team halves with cultural pattern fading from outer edge */
.half{
  flex:1;display:flex;align-items:center;gap:8px;min-width:0;
  position:relative;padding:7px 9px;border-radius:8px;overflow:hidden;
}
.half::before{
  content:"";position:absolute;inset:0;background:var(--pbg);
  -webkit-mask-image:linear-gradient(to right,#000 0%,rgba(0,0,0,.5) 55%,transparent 100%);
  mask-image:linear-gradient(to right,#000 0%,rgba(0,0,0,.5) 55%,transparent 100%);
  pointer-events:none;
}
.half.right{flex-direction:row-reverse;text-align:right}
.half.right::before{
  -webkit-mask-image:linear-gradient(to left,#000 0%,rgba(0,0,0,.5) 55%,transparent 100%);
  mask-image:linear-gradient(to left,#000 0%,rgba(0,0,0,.5) 55%,transparent 100%);
}
.half img{height:16px;width:24px;object-fit:cover;border-radius:2px;flex:none;box-shadow:0 1px 4px rgba(0,0,0,.55);position:relative}
.tname{font-weight:500;font-size:.86rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;position:relative}

/* center: 24h time + group */
.mid{flex:none;width:74px;text-align:center}
.ktime{font-weight:600;color:var(--gold);font-size:1.02rem;font-variant-numeric:tabular-nums;letter-spacing:.03em}
.grp{
  display:inline-grid;place-items:center;width:20px;height:20px;border-radius:50%;
  border:1px solid var(--gold-deep);color:var(--gold);font-weight:600;font-size:.62rem;
  font-family:'Cinzel',serif;margin-top:3px;cursor:pointer;background:transparent;
  padding:0;transition:all .18s;
}
.grp:hover{background:var(--gold);color:var(--night);box-shadow:0 0 12px rgba(227,197,103,.55);transform:scale(1.12)}
.grp:active{transform:scale(.96)}
/* brief gold flash when a group is jumped to */
@keyframes groupFlash{0%{box-shadow:0 0 0 0 rgba(227,197,103,.55)}100%{box-shadow:0 0 0 12px rgba(227,197,103,0)}}
.group-card.flash{animation:groupFlash 1.1s ease-out;border-color:var(--gold)}
.loc{
  text-align:center;color:var(--sand);font-size:.68rem;letter-spacing:.05em;margin-top:5px;font-weight:400;
}
.loc b{color:#A7B4D0;font-weight:500}
/* ---- expandable goal timeline ---- */
.match.expandable{cursor:pointer}
.match.expandable .m-row{position:relative}
.match.expandable .m-row::after{
  content:"▾";position:absolute;right:2px;top:50%;transform:translateY(-50%);
  color:var(--gold-deep);font-size:.7rem;opacity:.5;transition:transform .25s,opacity .2s;
}
.match.open .m-row::after{transform:translateY(-50%) rotate(180deg);opacity:.9}
.goals-panel{
  overflow:hidden;border-top:1px solid rgba(34,48,79,.5);margin-top:8px;padding-top:9px;
  display:grid;grid-template-columns:1fr 1fr;gap:8px;
  animation:goalsIn .3s ease;
}
@keyframes goalsIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.goal-col{display:flex;flex-direction:column;gap:5px}
.goal-col.away{align-items:flex-end}
.goal-line{
  position:relative;overflow:hidden;border-radius:7px;
  padding:6px 11px;min-width:0;max-width:100%;
  border:1px solid rgba(34,48,79,.55);
  display:flex;align-items:center;gap:7px;
  font-size:.78rem;color:var(--ink);
}
.goal-col.away .goal-line{flex-direction:row-reverse}
/* the team flag pattern, faint, waving like cloth in wind */
.goal-line .flagbg{
  position:absolute;inset:-30% -10%;z-index:0;opacity:.16;
  background:var(--gbg);background-size:cover;
  animation:flagwave 4.5s ease-in-out infinite;
  transform-origin:center;
}
@keyframes flagwave{
  0%   {transform:translateX(0) skewY(0deg)   scaleY(1)}
  25%  {transform:translateX(-4%) skewY(1.4deg) scaleY(1.03)}
  50%  {transform:translateX(-7%) skewY(0deg)   scaleY(1)}
  75%  {transform:translateX(-4%) skewY(-1.4deg) scaleY(1.03)}
  100% {transform:translateX(0) skewY(0deg)   scaleY(1)}
}
.goal-line .g-min{
  position:relative;z-index:1;font-weight:700;color:var(--gold);
  font-variant-numeric:tabular-nums;min-width:30px;
}
.goal-line .g-name{position:relative;z-index:1;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.goal-line .g-tag{
  position:relative;z-index:1;font-size:.56rem;letter-spacing:.06em;font-weight:700;
  color:var(--sand);border:1px solid rgba(201,184,150,.45);border-radius:4px;padding:1px 4px;
}
.goal-line .g-tag.pen{color:#7FB2FF;border-color:rgba(127,178,255,.5)}
.goal-line .g-tag.og{color:#E0566B;border-color:rgba(224,86,107,.5)}
@media (prefers-reduced-motion: reduce){ .goal-line .flagbg{animation:none} }

/* ---------- DAY BAND PATTERNS ---------- */
.p-sadu{background:
  repeating-linear-gradient(45deg,transparent 0 10px,rgba(11,16,32,.55) 10px 12px),
  repeating-linear-gradient(90deg,#8E1F1F 0 16px,#C9B896 16px 22px,#0B1020 22px 26px,#165D31 26px 42px,#0B1020 42px 46px,#C9B896 46px 52px);}
.p-aztec{background:
  repeating-linear-gradient(45deg,transparent 0 6px,rgba(11,16,32,.4) 6px 8px),
  repeating-linear-gradient(90deg,#006847 0 18px,#F4EFDF 18px 23px,#CE1126 23px 41px,#F4EFDF 41px 46px);}
.p-maple{background:repeating-linear-gradient(135deg,#D80621 0 16px,#F4EFDF 16px 21px,#D80621 21px 37px,#0B1020 37px 40px);}
.p-stars{background:
  radial-gradient(circle at 7px 5px,#F4EFDF 1.4px,transparent 2px),
  linear-gradient(90deg,#3C3B6E 0 38%,#B22234 62%,#8E1F2C 100%);
  background-size:22px 9px,100% 100%;}
.p-samba{background:repeating-linear-gradient(45deg,#009C3B 0 16px,#FFDF00 16px 26px,#002776 26px 30px);}
.p-iberia{background:repeating-linear-gradient(90deg,#AA151B 0 22px,#F1BF00 22px 34px);}
.p-albi{background:repeating-linear-gradient(90deg,#75AADB 0 18px,#F4EFDF 18px 36px);}
.p-kente{background:
  repeating-linear-gradient(45deg,transparent 0 9px,rgba(11,16,32,.45) 9px 11px),
  repeating-linear-gradient(90deg,#E5B80B 0 18px,#006B3F 18px 26px,#CE1126 26px 34px,#0B1020 34px 38px);}
.p-hosts{background:linear-gradient(90deg,#006847 0%,#F4EFDF 18%,#CE1126 33%,#B22234 50%,#F4EFDF 60%,#3C3B6E 75%,#D80621 100%);}
.p-zellige{background:repeating-conic-gradient(from 45deg,#C1272D 0 25%,#006233 0 50%) 0 0/16px 16px;}
.p-checker{background:repeating-conic-gradient(#C8102E 0 25%,#F4EFDF 0 50%) 0 0/14px 14px;}
.p-lions{background:repeating-linear-gradient(90deg,#F4EFDF 0 26px,#C8102E 26px 36px);}
.p-hino{background:radial-gradient(circle at 13px 4.5px,#BC002D 3.6px,transparent 4.2px),#F4EFDF;background-size:30px 9px;}
.p-gold{background:repeating-linear-gradient(45deg,#E3C567 0 14px,#B98A2E 14px 22px,#7A5A1B 22px 26px);}

/* ---------- LIVE APP STATES ---------- */
.day.past, .day.future{opacity:.72;filter:saturate(.78);transition:opacity .3s,filter .3s}
.day.past:hover, .day.future:hover{opacity:1;filter:none}
.half.win::after{
  content:"";position:absolute;inset:0;border:1.5px solid var(--gold);border-radius:8px;
  box-shadow:0 0 14px -3px rgba(227,197,103,.65), inset 0 0 16px -8px rgba(227,197,103,.55);
  pointer-events:none;
}
.half.win .tname{color:var(--gold);font-weight:600}
.ktime.score{letter-spacing:.12em}
.ktime.clock-only{font-size:1.02rem;letter-spacing:.04em}
.match.live .ktime.clock-only{color:#FF7B6B;text-shadow:0 0 12px rgba(255,90,90,.5)}
.match.ht .ktime.clock-only{color:#E3C567}
.ktime.score small{display:block;font-size:.56rem;color:var(--sand);letter-spacing:.22em;font-weight:500;margin-top:1px}
/* ---------- GOLDEN CONFETTI ---------- */
.confetti-piece{
  position:absolute;width:7px;height:11px;will-change:transform,opacity;
  pointer-events:none;z-index:5;border-radius:1px;
}
.match{position:relative}
/* ---------- HOST-NATION LOCATION TOUCH ---------- */
.loc{display:flex;align-items:center;justify-content:center;gap:7px}
.host-mark{flex:none;display:inline-flex;opacity:.85}
.host-mark svg{display:block}
.loc.us-loc{color:#9FB0D4}
.loc.ca-loc b, .loc.ca-loc{}
.host-us .host-mark{color:#6E86C6}
.host-ca .host-mark{color:#E66A6A}
.host-mx .host-mark{color:#E3C567}
.day.today{
  border-color:var(--gold-deep);
  box-shadow:0 0 0 1px rgba(227,197,103,.4),0 0 42px -4px rgba(227,197,103,.4),0 18px 40px -24px rgba(0,0,0,.8);
  position:relative;
}
.day.today .date-num{text-shadow:0 0 18px rgba(227,197,103,.8)}
.today-badge{
  display:inline-flex;align-items:center;gap:6px;border:1px solid var(--gold-deep);border-radius:999px;
  padding:3px 12px;font-size:.6rem;letter-spacing:.26em;text-transform:uppercase;font-weight:700;color:var(--gold);
  background:rgba(227,197,103,.1);
}
.today-badge::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--gold);animation:pulse 1.6s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.cd{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:9px 18px;border-bottom:1px solid var(--line);
  background:linear-gradient(90deg,rgba(227,197,103,.08),transparent 60%);
  font-size:.64rem;letter-spacing:.2em;text-transform:uppercase;color:var(--sand);font-weight:600;
}
.cd b{color:var(--gold);font-size:1.02rem;font-variant-numeric:tabular-nums;letter-spacing:.08em;font-weight:600}
.match.next{background:rgba(227,197,103,.08)}
.match.next .ktime{text-shadow:0 0 14px rgba(227,197,103,.7)}
.match.live{background:rgba(255,90,90,.08)}
.match.live .ktime{color:#FF7B6B}
.match.live .ktime .live-tag{
  display:block;font-size:.54rem;letter-spacing:.18em;font-weight:600;margin-top:1px;
  color:#FF7B6B;animation:pulse 1.4s infinite;
}
.match.ht .ktime{color:#E3C567}
.match.ht .ktime .live-tag{display:block;font-size:.54rem;letter-spacing:.18em;font-weight:600;margin-top:1px;color:#E3C567}
.match.ht{background:rgba(227,197,103,.07)}
.match.done{opacity:.5}

footer{margin-top:36px;text-align:center;color:#5C6A8A;font-size:.72rem;letter-spacing:.2em;text-transform:uppercase}

/* ---------- KNOCKOUT SECTION ---------- */
.ko{margin-top:54px}
.ko-title{
  text-align:center;font-family:'Cinzel',serif;font-weight:700;font-size:1.5rem;letter-spacing:.08em;
  background:linear-gradient(180deg,#F7ECCB,var(--gold) 60%,var(--gold-deep));
  -webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:6px;
}
.ko-sub{text-align:center;color:var(--sand);font-size:.74rem;letter-spacing:.22em;text-transform:uppercase;margin-bottom:24px}
/* group standings tables */
.groups-wrap{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;margin-bottom:30px;
}
.group-card{
  border:1px solid rgba(185,138,46,.34);border-radius:12px;overflow:hidden;
  background:linear-gradient(180deg,#111A2E 0%,#0E1526 100%);
  box-shadow:0 14px 36px -22px rgba(0,0,0,.85);
}
.group-head{
  display:flex;align-items:center;gap:10px;padding:11px 14px;
  background:linear-gradient(90deg,rgba(227,197,103,.12),transparent);
  border-bottom:1px solid rgba(34,48,79,.8);
}
.group-letter{
  flex:none;width:30px;height:30px;border-radius:7px;display:grid;place-items:center;
  font-family:'Cinzel',serif;font-weight:700;font-size:1rem;color:var(--night);
  background:linear-gradient(180deg,#F7ECCB,var(--gold) 60%,var(--gold-deep));
}
.group-title{font-family:'Cinzel',serif;font-weight:600;font-size:.82rem;letter-spacing:.1em;color:var(--sand);text-transform:uppercase}
.gtable{width:100%;border-collapse:collapse;font-size:.78rem}
.gtable thead th{
  font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;color:var(--sand);font-weight:600;
  padding:6px 4px;text-align:center;border-bottom:1px solid rgba(34,48,79,.6);
}
.gtable thead th.team-col{text-align:left;padding-left:13px}
.gtable tbody td{padding:7px 4px;text-align:center;border-bottom:1px solid rgba(34,48,79,.35)}
.gtable tbody tr:last-child td{border-bottom:none}
.gtable .team-cell{display:flex;align-items:center;gap:8px;text-align:left;padding-left:13px}
.gtable .team-cell img{width:22px;height:15px;object-fit:cover;border-radius:2px;flex:none;box-shadow:0 1px 3px rgba(0,0,0,.5)}
.gtable .team-cell .nm{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;color:var(--ink)}
.gtable .pts{font-family:'Cinzel',serif;font-weight:700;color:var(--gold)}
.gtable tr.q1,.gtable tr.q2{background:rgba(227,197,103,.06)}
.gtable tr.q1 .rank,.gtable tr.q2 .rank{color:var(--gold);font-weight:700}
.gtable .rank{color:var(--sand);font-size:.66rem;width:18px}
/* W-D-L mini indicator */
.wdl{display:inline-flex;gap:2px;justify-content:center}
.wdl i{width:7px;height:7px;border-radius:50%;display:inline-block}
.wdl .w{background:#4ED38A}
.wdl .d{background:var(--sand)}
.wdl .l{background:#E0566B}
/* ---- live (provisional) standings cues ---- */
.group-card.card-live{
  border-color:rgba(255,123,107,.6);
  box-shadow:0 14px 36px -22px rgba(0,0,0,.85), 0 0 22px -4px rgba(255,90,90,.35);
}
.live-pill{
  margin-left:auto;font-size:.56rem;letter-spacing:.16em;font-weight:700;color:#FF7B6B;
  border:1px solid rgba(255,123,107,.5);border-radius:20px;padding:2px 9px;
  display:inline-flex;align-items:center;gap:5px;
}
.live-pill::before{content:"";width:6px;height:6px;border-radius:50%;background:#FF7B6B;animation:pulse 1.3s infinite}
.gtable tr.row-live{background:rgba(255,90,90,.07)}
.gtable tr.row-live .nm{color:#FFD9D2}
.row-live-dot{flex:none;width:7px;height:7px;border-radius:50%;background:#FF7B6B;animation:pulse 1.3s infinite}
.gtable .pts-live{color:#FF7B6B}
.gtable tr.row-live.q1,.gtable tr.row-live.q2{background:rgba(255,120,90,.1)}
/* provisional W/D/L dots (live match) get a ring */
.wdl .wl{background:#4ED38A;box-shadow:0 0 0 2px rgba(78,211,138,.3)}
.wdl .dl{background:var(--sand);box-shadow:0 0 0 2px rgba(201,184,150,.3)}
.wdl .ll{background:#E0566B;box-shadow:0 0 0 2px rgba(224,86,107,.3)}

@media (max-width:920px){ .grid{grid-template-columns:1fr} }
@media (max-width:520px){
  .wrap{padding:30px 12px 70px}
  .tname{font-size:.76rem}
  .mid{width:58px}
  .ktime{font-size:.92rem}
  h1{font-size:1.9rem}
  .day-head{padding:12px 13px 9px}
  .match{padding:9px 9px 8px}

/* ============ GROUPS & STANDINGS ============
   Groups (A–L) are derived from the match schedule: every match carries its
   group letter, so we collect the 4 teams per group automatically. Standings
   (P/W/D/L/GD/Pts) compute from finished results — both the built-in RESULTS
   and any finished matches in LIVE (scores.json). */

/* derive {A:[codes], B:[codes], ...} from DAYS */
function deriveGroups(){
  const groups={};
  for(const day of DAYS){
    for(const [t,a,b,grp,v] of day.m){
      if(!groups[grp]) groups[grp]=new Set();
      groups[grp].add(a); groups[grp].add(b);
    }
  }
  /* Set -> array, sorted by group letter */
  const out={};
  Object.keys(groups).sort().forEach(g=>{ out[g]=[...groups[g]]; });
  return out;
}
const GROUPS = deriveGroups();

/* collect every match score as {a,b,ha,hb,live} — live/finished API data
   takes priority over the built-in RESULTS seeds for the same pairing. */
function collectFinished(){
  const fixtures=[];
  const liveData = (typeof LIVE !== "undefined" && LIVE) ? LIVE : {};
  const code = (typeof codeFromName === "function")
    ? codeFromName
    : (name)=>{ const n=norm(name); for(const c in N){ if(norm(N[c][0])===n) return c; } return null; };

  /* 1) API live/finished matches first (these win) */
  for(const key in liveData){
    const lv=liveData[key];
    if(lv._flipped) continue; /* skip the reversed duplicate */
    const ca=code(lv.home), cb=code(lv.away);
    if(!ca||!cb) continue;
    const finished = (lv.state==="FT"||lv.state==="AET"||lv.state==="AP");
    const inPlay   = (lv.state==="LIVE"||lv.state==="HT"||lv.state==="ET"||lv.state==="PEN");
    if(!finished && !inPlay) continue;
    /* a live match with no goals yet arrives as null/null → treat as 0-0 */
    const ha = (lv.homeScore==null) ? 0 : lv.homeScore;
    const hb = (lv.awayScore==null) ? 0 : lv.awayScore;
    /* finished match must have a real score; in-play may legitimately be 0-0 */
    if(finished && lv.homeScore==null && lv.awayScore==null) continue;
    if(fixtures.some(f=>(f.a===ca&&f.b===cb)||(f.a===cb&&f.b===ca))) continue;
    fixtures.push({a:ca, b:cb, ha, hb, live:inPlay});
  }

  /* 2) built-in RESULTS seeds — only if the API has nothing for that pairing */
  for(const key in RESULTS){
    const m=key.match(/^\d+-([A-Z]+)-([A-Z]+)$/);
    if(!m) continue;
    const a=m[1], b=m[2];
    if(fixtures.some(f=>(f.a===a&&f.b===b)||(f.a===b&&f.b===a))) continue;
    const [ha,hb]=RESULTS[key];
    fixtures.push({a, b, ha, hb});
  }
  return fixtures;
}

/* set of team codes currently in a live (in-play) match */
function liveTeamCodes(){
  const set=new Set();
  collectFinished().forEach(f=>{ if(f.live){ set.add(f.a); set.add(f.b); } });
  return set;
}

/* compute standings for a set of team codes given finished + live fixtures */
function computeStandings(codes){
  const tbl={};
  codes.forEach(c=>{ tbl[c]={code:c,P:0,W:0,D:0,L:0,GF:0,GA:0,Pts:0,seq:[],live:false}; });
  const fx=collectFinished();
  for(const f of fx){
    if(!(f.a in tbl) || !(f.b in tbl)) continue; /* only matches within this group */
    const A=tbl[f.a], B=tbl[f.b];
    A.P++; B.P++; A.GF+=f.ha; A.GA+=f.hb; B.GF+=f.hb; B.GA+=f.ha;
    if(f.live){ A.live=true; B.live=true; }
    const wTag = f.live ? 'wl' : 'w';   /* 'wl' = provisional win dot */
    const dTag = f.live ? 'dl' : 'd';
    const lTag = f.live ? 'll' : 'l';
    if(f.ha>f.hb){ A.W++; B.L++; A.Pts+=3; A.seq.push(wTag); B.seq.push(lTag); }
    else if(f.hb>f.ha){ B.W++; A.L++; B.Pts+=3; B.seq.push(wTag); A.seq.push(lTag); }
    else { A.D++; B.D++; A.Pts++; B.Pts++; A.seq.push(dTag); B.seq.push(dTag); }
  }
  const rows=Object.values(tbl);
  rows.forEach(r=>r.GD=r.GF-r.GA);
  /* sort: points, then GD, then GF, then name */
  rows.sort((x,y)=> y.Pts-x.Pts || y.GD-x.GD || y.GF-x.GF || N[x.code][0].localeCompare(N[y.code][0]));
  return rows;
}

function renderGroups(){
  const ar = LANG==="ar";
  const head = ar
    ? {team:"المنتخب", p:"ل", w:"ف", d:"ت", l:"خ", gd:"الفارق", pts:"نقاط"}
    : {team:"Team", p:"P", w:"W", d:"D", l:"L", gd:"GD", pts:"Pts"};
  const grpWord = ar ? "المجموعة" : "Group";
  let html="";
  const liveLabel = ar ? "مباشر" : "LIVE";
  for(const g of Object.keys(GROUPS)){
    const rows=computeStandings(GROUPS[g]);
    const groupLive = rows.some(r=>r.live);
    let body="";
    rows.forEach((r,i)=>{
      const qcls = i===0?'q1':i===1?'q2':'';
      const live = r.live ? ' row-live' : '';
      const gd = (r.GD>0?'+':'') + r.GD;
      const wdl = r.seq.map(s=>`<i class="${s}"></i>`).join('');
      const ptsCls = r.live ? 'pts pts-live' : 'pts';
      body+=`<tr class="${qcls}${live}">
        <td class="rank">${i+1}</td>
        <td><div class="team-cell">${flag(N[r.code][1])}<span class="nm">${teamName(r.code)}</span>${r.live?'<span class="row-live-dot"></span>':''}</div></td>
        <td>${r.P}</td><td>${r.W}</td><td>${r.D}</td><td>${r.L}</td>
        <td>${gd}</td><td class="${ptsCls}">${r.Pts}</td>
      </tr>`;
    });
    html+=`<div class="group-card${groupLive?' card-live':''}" id="group-${g}">
      <div class="group-head">
        <span class="group-letter">${g}</span>
        <span class="group-title">${grpWord} ${g}</span>
        ${groupLive?`<span class="live-pill">${liveLabel}</span>`:''}
      </div>
      <table class="gtable">
        <thead><tr>
          <th class="rank"></th><th class="team-col">${head.team}</th>
          <th>${head.p}</th><th>${head.w}</th><th>${head.d}</th><th>${head.l}</th>
          <th>${head.gd}</th><th>${head.pts}</th>
        </tr></thead>
        <tbody>${body}</tbody>
      </table>
    </div>`;
  }
  document.getElementById('groups').innerHTML=html;
}

/* ============ GOLDEN CONFETTI ============ */
const GOLDS=['#E3C567','#F7ECC4','#B98A2E','#D9B65A','#FFE9A8'];
function burst(matchEl){
  const winHalf=matchEl.querySelector('.half.win');
  if(!winHalf) return;
  const mr=matchEl.getBoundingClientRect();
  const hr=winHalf.getBoundingClientRect();
  const originX=(hr.left-mr.left)+hr.width/2;
  const originY=(hr.top-mr.top)+hr.height/2;
  const N=22;
  for(let i=0;i<N;i++){
    const p=document.createElement('div');
    p.className='confetti-piece';
    p.style.background=GOLDS[i%GOLDS.length];
    p.style.left=originX+'px';
    p.style.top=originY+'px';
    matchEl.appendChild(p);
    const ang=(Math.PI*2)*(i/N)+ (Math.random()*0.5);
    const vel=40+Math.random()*70;
    const dx=Math.cos(ang)*vel;
    const dy=Math.sin(ang)*vel - (30+Math.random()*40);
    const rot=(Math.random()*720-360);
    const dur=750+Math.random()*650;
    p.animate([
      {transform:`translate(0,0) rotate(0deg)`,opacity:1},
      {transform:`translate(${dx}px,${dy+60}px) rotate(${rot}deg)`,opacity:0}
    ],{duration:dur,easing:'cubic-bezier(.2,.7,.3,1)',fill:'forwards'});
    setTimeout(()=>p.remove(),dur+50);
  }
}
/* hover (desktop) + tap (mobile) on a finished winner replays confetti */
function reattachConfetti(){
  document.querySelectorAll('.match').forEach(m=>{
    if(!m.querySelector('.half.win')) return;
    if(m.dataset.confetti) return; /* avoid double-binding */
    m.dataset.confetti = "1";
    m.addEventListener('mouseenter',()=>burst(m));
    /* mobile: tap the match to celebrate */
    m.addEventListener('click',()=>burst(m));
    m.addEventListener('touchend',(e)=>{ burst(m); },{passive:true});
  });
}
reattachConfetti();

/* build the two-column goal timeline for a match, using the live goal data */
function buildGoalsHTML(m){
  const lv = LIVE[norm(m.dataset.home)+"|"+norm(m.dataset.away)];
  const ha = m.dataset.ha, hb = m.dataset.hb;     /* team codes */
  const hPat = N[ha] ? N[ha][2] : "";             /* flag patterns */
  const aPat = N[hb] ? N[hb][2] : "";
  const homeGoals = (lv && lv.homeGoals) ? lv.homeGoals : [];
  const awayGoals = (lv && lv.awayGoals) ? lv.awayGoals : [];
  const tag = (g)=> g.pen ? '<span class="g-tag pen">PEN</span>'
                  : g.og ? '<span class="g-tag og">OG</span>' : '';
  const line = (g, pat)=>`<div class="goal-line">
      <span class="flagbg" style="--gbg:${pat}"></span>
      <span class="g-min">${g.minute||''}</span>
      <span class="g-name">${g.name||''}</span>${tag(g)}
    </div>`;
  const homeCol = homeGoals.map(g=>line(g,hPat)).join('');
  const awayCol = awayGoals.map(g=>line(g,aPat)).join('');
  return `<div class="goal-col home">${homeCol}</div><div class="goal-col away">${awayCol}</div>`;
}

/* a match is expandable if it's finished or live (it can have goals) */
function isExpandable(m){
  return m.classList.contains('done') || m.classList.contains('live') ||
         m.classList.contains('ht') || m.querySelector('.ktime.score');
}

function collapseMatch(m){
  const p = m.querySelector('.goals-panel');
  if(p){ p.hidden = true; p.innerHTML = ''; }
  m.classList.remove('open');
}
function expandMatch(m){
  /* close any other open match (only one open at a time) */
  document.querySelectorAll('.match.open').forEach(o=>{ if(o!==m) collapseMatch(o); });
  const p = m.querySelector('.goals-panel');
  if(!p) return;
  p.innerHTML = buildGoalsHTML(m);
  p.hidden = false;
  m.classList.add('open');
}

document.getElementById('schedule').addEventListener('click',(e)=>{
  /* group badge → jump to that group's table (takes priority, no expand) */
  const btn=e.target.closest('.grp');
  if(btn){
    const g=btn.dataset.grp;
    const card=document.getElementById('group-'+g);
    if(card){
      card.scrollIntoView({behavior:'smooth', block:'center'});
      card.classList.remove('flash'); void card.offsetWidth;
      card.classList.add('flash');
      setTimeout(()=>card.classList.remove('flash'),1200);
    }
    return;
  }
  /* otherwise: tap a finished/live match to expand its goal timeline */
  const m=e.target.closest('.match');
  if(!m || !isExpandable(m)) return;
  if(m.classList.contains('open')) collapseMatch(m);
  else expandMatch(m);
});

/* ================= LIVE MATCHDAY ENGINE ================= */
/* Everything is computed in Mecca time (UTC+3), no matter where the page is opened. */
const MECCA_OFFSET = 3*3600000;
const MATCH_LEN = 2.25*3600000; /* a match is considered live for ~2h15 after kickoff */

/* ---- LIVE SCORES from scores.json (written by the GitHub Action) ----
   We never call the API from here; we just read the static file. */
/* ====== LIVE DATA SOURCE ======
   Paste your Cloudflare Worker URL here (e.g. "https://wc26-scores.<you>.workers.dev").
   Leave as "" to use the local scores.json (GitHub Action) instead. */
const SCORES_URL = "";

let LIVE = {};   /* key: "teamA|teamB" (normalised) -> {homeScore,awayScore,state,minute} */

/* second-half timing: remember when each match resumed after half-time, and
   the last state we saw, so we can detect the HT→play restart. Persisted to
   localStorage so it survives the 60s refreshes and page reloads. */
let HALF2_ANCHOR = {};
let PREV_STATE = {};
try{
  HALF2_ANCHOR = JSON.parse(localStorage.getItem('wc26_half2')||'{}');
  PREV_STATE   = JSON.parse(localStorage.getItem('wc26_prev')||'{}');
}catch(e){ HALF2_ANCHOR={}; PREV_STATE={}; }
function persistTiming(){
  try{
    localStorage.setItem('wc26_half2', JSON.stringify(HALF2_ANCHOR));
    localStorage.setItem('wc26_prev', JSON.stringify(PREV_STATE));
  }catch(e){}
}

  "cape verde":"cape verde", "cabo verde":"cape verde",
  // long / short forms
  "bosnia & herz.":"bosnia & herzegovina", "bosnia and herzegovina":"bosnia & herzegovina",
  "bosnia-herzegovina":"bosnia & herzegovina", "bosnia & herzegovina":"bosnia & herzegovina",
  "dr congo":"dr congo", "congo dr":"dr congo", "democratic republic of congo":"dr congo",
  "congo democratic republic":"dr congo", "democratic republic of the congo":"dr congo",
  "iran":"iran", "ir iran":"iran", "islamic republic of iran":"iran",
  "south africa":"south africa", "new zealand":"new zealand", "saudi arabia":"saudi arabia",
  "united kingdom scotland":"scotland", "scotland":"scotland"
};
/* map an arbitrary feed name to the canonical key used by the schedule.
   1) lower/trim/space-collapse, 2) alias table, 3) accent-strip fallback so
   e.g. "Türkiye" still equals "turkiye". */
function stripAccents(s){ return s.normalize("NFD").replace(/[\u0300-\u036f]/g,""); }
const norm = s => {
  let x = (s||"").toLowerCase().trim().replace(/\s+/g," ");
  if(NAME_ALIASES[x]) return NAME_ALIASES[x];
  const xa = stripAccents(x);
  if(NAME_ALIASES[xa]) return NAME_ALIASES[xa];
  /* compare accent-stripped against alias keys too */
  for(const k in NAME_ALIASES){ if(stripAccents(k)===xa) return NAME_ALIASES[k]; }
  return xa; /* canonical = accent-stripped lower-case */
};

async function loadScores(){
  try{
    /* Live data comes from the Cloudflare Worker (polls football-data.org every
       minute, key stays server-side). Set SCORES_URL to your Worker URL.
       If it's left blank, we fall back to the local scores.json file. */
    const url = SCORES_URL
      ? SCORES_URL + (SCORES_URL.includes('?')?'&':'?') + '_=' + Date.now()
      : 'scores.json?_=' + Date.now();
    const res = await fetch(url, {cache:'no-store'});
    if(!res.ok) return;
    const data = await res.json();
    const map = {};
    for(const m of (data.matches||[])){
      const a = norm(m.home), b = norm(m.away);
      map[a+"|"+b] = m;
      map[b+"|"+a] = {...m, homeScore:m.awayScore, awayScore:m.homeScore,
                     homeGoals:m.awayGoals, awayGoals:m.homeGoals,
                     _flipped:true}; /* allow lookup in either order */
    }
    LIVE = map;
    /* diagnostic: warn about any live match whose teams don't match our schedule,
       so unmatched API names are easy to spot in the browser console */
    for(const m of (data.matches||[])){
      const ca = codeFromName(m.home), cb = codeFromName(m.away);
      if(!ca) console.warn('[WC26] Unmatched team name from API:', JSON.stringify(m.home));
      if(!cb) console.warn('[WC26] Unmatched team name from API:', JSON.stringify(m.away));
    }
    /* recompute standings with any newly-finished/live matches */
    if(typeof renderGroups === "function") renderGroups();
  }catch(e){ /* keep last good LIVE; fall back to built-in RESULTS */ }
}
/* resolve a feed name to our team code, or null if unknown */
function codeFromName(name){
  const n=norm(name);
  for(const c in N){ if(norm(N[c][0])===n) return c; }
  return null;
}
/* refresh every 60s; scores.json itself updates on the Action's schedule */
loadScores();
setInterval(loadScores, 60000);

function meccaNow(){ return new Date(Date.now() + MECCA_OFFSET); } /* read with getUTC* */

function meccaToday(){
  const m = meccaNow();
  return {y:m.getUTCFullYear(), mo:m.getUTCMonth(), d:m.getUTCDate()};
}

const dayCards = () => [...document.querySelectorAll('.day')];
const fmt = n => String(n).padStart(2,'0');

/* update a match row's center block.
   scoreText: e.g. "2 – 1"; liveTag: "HALF-TIME"/"45'"/etc (in-play);
   ftTag: "FT"/"AET"/"AP" (finished). If scoreText is null, restores kickoff time. */
const CLOCK_ONLY = Symbol('clock-only');
function setMid(m, scoreText, liveTag, ftTag){
  const mid = m.querySelector('.mid');
  const grp = mid.querySelector('.grp');
  const grpHtml = grp ? grp.outerHTML : '';
  let kt;
  if(scoreText==null){
    kt = `<div class="ktime">${m.dataset.kick}</div>`;
  }else if(ftTag){
    kt = `<div class="ktime score">${scoreText}<small>${ftTag}</small></div>`;
  }else if(scoreText===CLOCK_ONLY){
    /* no score available (no API) — show the running clock in place of the time */
    kt = `<div class="ktime clock-only">${liveTag||'LIVE'}</div>`;
  }else{
    kt = `<div class="ktime">${scoreText}<span class="live-tag">${liveTag||'LIVE'}</span></div>`;
  }
  mid.innerHTML = kt + grpHtml;
}

function tick(){
  const now = Date.now();
  const t = meccaToday();
  const inJune26 = (t.y===2026 && t.mo===5);

  /* derive a match clock from kickoff when the API gives no minute.
     0–45' first half, ~15min half-time break, 45–90' second half, then 90'+ */
  function clockFromKickoff(ko){
    const elapsedMin = Math.floor((now - ko)/60000);
    if(elapsedMin < 0) return {label:null, ht:false};
    if(elapsedMin <= 45) return {label:elapsedMin+"'", ht:false};
    if(elapsedMin < 60)  return {label:null, ht:true};   /* half-time window */
    const second = elapsedMin - 15;                       /* subtract the break */
    if(second <= 90) return {label:second+"'", ht:false};
    return {label:"90'+", ht:false};
  }

  /* second-half clock anchored to the real restart.
     When we detect a match resuming after half-time, we store the wall-clock
     moment in HALF2_ANCHOR (persisted), then count 45'+ from there. If we never
     caught the restart, fall back to the kickoff-based estimate. */
  function secondHalfLabel(key, ko){
    const anchor = HALF2_ANCHOR[key];
    if(anchor){
      const mins = 45 + Math.floor((now - anchor)/60000);
      return mins <= 90 ? mins+"'" : "90'+";
    }
    return clockFromKickoff(ko).label || (LANG==="ar"?AR_UI.live:"LIVE");
  }

  let todayCard = null;

  for(const card of dayCards()){
    const d = +card.dataset.day;
    const matches = [...card.querySelectorAll('.match')];
    const lastEnd = Math.max(...matches.map(m=>+m.dataset.utc)) + MATCH_LEN;
    const firstKo = Math.min(...matches.map(m=>+m.dataset.utc));

    /* today detection (Mecca calendar) */
    const isToday = inJune26 && d===t.d;
    card.classList.toggle('today', isToday);
    if(isToday) todayCard = card;

    /* past-day fade once its last match ends; future-day fade before its first kickoff */
    card.classList.toggle('past', now > lastEnd && !isToday);
    card.classList.toggle('future', now < firstKo && !isToday);

    /* per-match states */
    let nextSet = false;
    for(const m of matches){
      const ko = +m.dataset.utc;
      const lv = LIVE[norm(m.dataset.home)+"|"+norm(m.dataset.away)];

      /* time-based fallback when no API data is present */
      let live = now>=ko && now<ko+MATCH_LEN;
      let done = now>=ko+MATCH_LEN;
      let ht=false, finalScore=null, liveTag=null;

      if(lv){
        const st = lv.state;
        const mkey = norm(m.dataset.home)+"|"+norm(m.dataset.away);
        /* detect the half-time → play restart: if we previously saw HT and now
           it's live again, anchor the second half to this moment (once) */
        if(st==="LIVE" && PREV_STATE[mkey]==="HT" && !HALF2_ANCHOR[mkey]){
          HALF2_ANCHOR[mkey] = now;
        }
        /* a finished match clears its timing memory so a re-run is clean */
        if(st==="FT"||st==="AET"||st==="AP"){ delete HALF2_ANCHOR[mkey]; }
        PREV_STATE[mkey] = st;

        if(st==="LIVE"||st==="ET"||st==="PEN"){
          live=true; done=false;
          if(st==="ET"){ liveTag = lv.minute ? lv.minute+"'" : (LANG==="ar"?AR_UI.et:"EXTRA TIME"); }
          else if(st==="PEN"){ liveTag = (LANG==="ar"?AR_UI.pen:"PENALTIES"); }
          else {
            /* if we've anchored the second half, count from the real restart;
               otherwise estimate from kickoff (subtracting the break) */
            const elapsedFromKo = Math.floor((now - ko)/60000);
            if(HALF2_ANCHOR[mkey] || elapsedFromKo >= 60){
              liveTag = secondHalfLabel(mkey, ko);
            }else{
              /* first half: trust the kickoff clock (it's accurate early on) */
              liveTag = clockFromKickoff(ko).label || (LANG==="ar"?AR_UI.live:"LIVE");
            }
          }
        }else if(st==="HT"){
          live=false; done=false; ht=true; liveTag=(LANG==="ar"?AR_UI.ht:"HALF-TIME");
        }else if(st==="FT"||st==="AET"||st==="AP"){
          live=false; done=true;
          finalScore = {h:lv.homeScore, a:lv.awayScore,
                        tag: st==="AP"?"AP":st==="AET"?"AET":(LANG==="ar"?"انتهت":"FT")};
        }
        /* live score line while in play / HT (null scores = 0 for a goalless live match) */
        if(live||ht){
          const hs = (lv.homeScore==null)?0:lv.homeScore;
          const as = (lv.awayScore==null)?0:lv.awayScore;
          setMid(m, `${hs} – ${as}`, liveTag);
        }
      }else if(live){
        /* no API data, but kickoff time has passed → show a running match clock */
        const clk = clockFromKickoff(ko);
        if(clk.ht){ live=false; ht=true; liveTag=(LANG==="ar"?AR_UI.ht:"HALF-TIME"); }
        else { liveTag = clk.label || (LANG==="ar"?AR_UI.live:"LIVE"); }
        /* keep the existing score if RESULTS has one; otherwise replace the
           kickoff time with the running clock (no score available without API) */
        const existing = m.querySelector('.ktime.score');
        if(!existing){
          setMid(m, CLOCK_ONLY, liveTag);
        }
      }

      m.classList.toggle('live', live);
      m.classList.toggle('ht', ht);
      m.classList.toggle('done', done);
      m.classList.toggle('next', false);
      /* a match becomes pressable once it can have goals (live/ht/done) */
      const canExpand = live || ht || done || !!m.querySelector('.ktime.score');
      m.classList.toggle('expandable', canExpand);
      /* if this match is currently open, refresh its goal panel with new data */
      if(m.classList.contains('open')){
        const p=m.querySelector('.goals-panel');
        if(p && !p.hidden) p.innerHTML = buildGoalsHTML(m);
      }

      /* apply API final score + winner ring if the match has ended live */
      if(finalScore){
        setMid(m, `${finalScore.h} – ${finalScore.a}`, null, finalScore.tag);
        const halves=m.querySelectorAll('.half');
        if(finalScore.h>finalScore.a){halves[0].classList.add('win');halves[1].classList.remove('win');}
        else if(finalScore.a>finalScore.h){halves[1].classList.add('win');halves[0].classList.remove('win');}
      }

      if(isToday && !live && !done && !ht && !nextSet){ m.classList.add('next'); nextSet=true; }
    }

    /* countdown bar lives ONLY inside today's card */
    let cd = card.querySelector('.cd');
    if(isToday){
      if(!cd){
        cd = document.createElement('div');
        cd.className = 'cd';
        card.querySelector('.day-head').after(cd);
        card.querySelector('.head-extra').innerHTML = `<span class="today-badge">${LANG==="ar"?AR_UI.today:"Today"}</span>`;
      }
      const upcoming = matches.map(m=>+m.dataset.utc).filter(ko=>ko>now).sort((a,b)=>a-b)[0];
      const liveOne  = matches.find(m=>m.classList.contains('live'));
      if(liveOne && !upcoming){
        cd.innerHTML = `<span>${LANG==="ar"?AR_UI.in_play:"Match in play"}</span><b>${LANG==="ar"?AR_UI.live:"LIVE"}</b>`;
      }else if(upcoming){
        let s = Math.floor((upcoming-now)/1000);
        const h=Math.floor(s/3600); s-=h*3600;
        const mi=Math.floor(s/60); const se=s-mi*60;
        const lbl = liveOne ? (LANG==="ar"?AR_UI.in_play_next:'Match in play · next kick-off')
                            : (LANG==="ar"?AR_UI.next_ko:'Next kick-off');
        cd.innerHTML = `<span>${lbl}</span><b>${fmt(h)}:${fmt(mi)}:${fmt(se)}</b>`;
      }else{
        cd.innerHTML = `<span>${LANG==="ar"?AR_UI.done:"Matchday complete"}</span><b>—</b>`;
      }
    }else if(cd){
      cd.remove();
      card.querySelector('.head-extra').innerHTML = '';
    }
  }
  persistTiming();
  return todayCard;
}

/* ============ DESCENDING ZIG-ZAG BALL ============ */
(function(){
  const ball=document.getElementById('wc-ball');
  if(!ball) return;
  const W=()=>window.innerWidth, H=()=>window.innerHeight;
  let target=0, current=0;
  function compute(){
    const max=Math.max(1, document.documentElement.scrollHeight - H());
    target=Math.min(1, Math.max(0, window.scrollY / max));
  }
  function frame(){
    current += (target-current)*0.08; /* smoothing */
    const p=current;
    const vy = p*(H()-70) + 12;                 /* descend down the viewport */
    const amp = Math.min(W()*0.34, 260);        /* zig-zag width */
    const cx = W()/2 - 23;
    const vx = cx + Math.sin(p*Math.PI*5)*amp;   /* 2.5 full sweeps top→bottom */
    ball.style.transform=`translate(${vx}px,${vy}px)`;
    requestAnimationFrame(frame);
  }
  window.addEventListener('scroll',compute,{passive:true});
  window.addEventListener('resize',compute);
  compute(); frame();
})();
